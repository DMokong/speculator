# Gate 1: Spec Quality Scorecard
# Scores + flags + weights + dimension_minimum recorded by the spec-scorer agent
# (weights and minimum arrive inline in its dispatch prompt); threshold + result
# stamped post-dispatch by the invoking skill (scorer never sees the threshold).
# Do not edit manually.

gate: spec-quality
spec_id:                    # e.g. SPEC-042
spec_path:                  # e.g. docs/specs/add-user-auth/spec.md
timestamp:                  # ISO 8601
scorer: llm-as-judge
model:                      # model that produced this score

weights:                    # recorded by the scorer from the inline-provided values —
  completeness:             # makes `overall` mechanically recomputable by verify-evidence.sh
  clarity:
  testability:
  intent_verifiability:
  feasibility:
  scope:

scores:
  completeness:             # 1-10
  clarity:                  # 1-10
  testability:              # 1-10
  intent_verifiability:     # 1-10: intent captured, anti-patterns documented, user journeys addressed?
  feasibility:              # 1-10
  scope:                    # 1-10
  overall:                  # weighted average

threshold:                  # leave unset — stamped post-dispatch by the invoking skill
dimension_minimum: 5        # recorded by the scorer from the inline-provided value — each dimension must be >= this
result:                     # leave unset — stamped post-dispatch by the invoking skill (pass | fail)

flags:
  blocking:                 # must be addressed for gate to pass
    # - "..."
  recommended:              # should be addressed
    # - "..."
  advisory:                 # nice to have
    # - "..."

# Human override (fill in manually if overriding a fail)
override:
  overridden: false
  justification:
  overridden_by:
  override_date:
