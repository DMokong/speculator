# Gate 1: Spec Quality Scorecard
# Generated by the spec-scorer agent — do not edit manually

gate: spec-quality
spec_id:                    # e.g. SPEC-042
spec_path:                  # e.g. docs/specs/add-user-auth/spec.md
timestamp:                  # ISO 8601, e.g. 2026-03-03T10:30:00Z
scorer: llm-as-judge
model:                      # model that produced this score

scores:
  completeness:             # 1-10: all required sections present and substantive?
  clarity:                  # 1-10: unambiguous, two engineers build the same thing?
  testability:              # 1-10: every AC objectively verifiable?
  overall:                  # weighted average (see project config for weights)

threshold:                  # from project config (e.g. 7.0)
result:                     # pass | fail

flags:                      # list of free-text observations
  # - "R2: consider specifying exact timeout value"

# Human override (fill in manually if overriding a fail)
override:
  overridden: false
  justification:
  overridden_by:
  override_date:
