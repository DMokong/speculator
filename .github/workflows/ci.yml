name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  structural-tests:
    name: Structural tests (shell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Eval-intent structure suite
        run: bash tests/test-eval-intent-structure.sh
      - name: Secrets-scan pattern suite
        run: bash tests/test-secrets-scan.sh
      - name: Gate wiring consistency suite
        run: bash tests/test-gate-wiring.sh
      - name: verify-evidence.sh syntax check
        run: bash -n scripts/verify-evidence.sh
      - name: verify-evidence.sh self-test (known-good dogfood evidence)
        run: scripts/verify-evidence.sh docs/specs/eval-quality-scoring

  asbuilt-typecheck:
    # PR #2 review wave 2 (claw-kt2c): `bun test` strips types, so a tsc
    # regression is invisible to the test suite — this job is the typecheck
    # invariant's only enforcement point. (The bun test suite itself is not
    # yet in CI pending the flake investigation; see claw-kt2c follow-ups.)
    name: asbuilt typecheck + lint (bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14 # match the pinned vendor-minification toolchain (VENDOR.md)
      - name: Install asbuilt deps
        working-directory: asbuilt
        run: bun install --frozen-lockfile
      - name: Typecheck
        working-directory: asbuilt
        run: bun run typecheck
      - name: Lint
        working-directory: asbuilt
        run: bun run lint

  benchmark-tests:
    name: Spec-Bench unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Run pytest
        working-directory: benchmarks
        run: uv run pytest -q

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: plugin.json parses and matches CHANGELOG top entry
        run: |
          set -euo pipefail
          PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          CHANGELOG_VERSION=$(grep -m1 -oE '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | awk '{print $2}')
          echo "plugin.json: $PLUGIN_VERSION  |  CHANGELOG: $CHANGELOG_VERSION"
          if [ "$PLUGIN_VERSION" != "$CHANGELOG_VERSION" ]; then
            echo "::error::plugin.json version ($PLUGIN_VERSION) does not match CHANGELOG top entry ($CHANGELOG_VERSION)"
            exit 1
          fi
