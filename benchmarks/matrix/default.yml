benchmark:
  prd: weather-transport
  runs_per_combination: 1

  constant_implementer:
    harness: claude-code
    model: sonnet-4-6
    process: superpowers
    permissions: dangerously-skip-permissions

  judge:
    model: opus-4-6

  # Spec scorer (Gate-1 LLM judge). model is pinned — without it the scorer
  # runs on whatever the operator's claude CLI defaults to, making the
  # recorded scorer_model unverifiable.
  scorer:
    model: claude-sonnet-4-6
    improvement_mode: feedback   # feedback | control | none
    rubric_source: inline        # inline | production (rubrics/spec-quality.md)

  targets:
    - id: cc-vanilla-opus
      harness: claude-code
      model: opus-4-6
      process: vanilla

    - id: cc-vanilla-sonnet
      harness: claude-code
      model: sonnet-4-6
      process: vanilla

    - id: cc-sp-opus
      harness: claude-code
      model: opus-4-6
      process: superpowers

    - id: cc-sp-sonnet
      harness: claude-code
      model: sonnet-4-6
      process: superpowers

    - id: copilot-vanilla-gpt41
      harness: copilot-cli
      model: gpt-4.1
      process: vanilla

    - id: copilot-sp-gpt41
      harness: copilot-cli
      model: gpt-4.1
      process: superpowers

    - id: copilot-vanilla-opus
      harness: copilot-cli
      model: opus-4-6
      process: vanilla

    - id: copilot-sp-opus
      harness: copilot-cli
      model: opus-4-6
      process: superpowers
