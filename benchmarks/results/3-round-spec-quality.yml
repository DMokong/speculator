# 3-Round Spec Quality Benchmark Results
# Date: 2026-03-29
# PRD: weather-transport (Smart Commuter)
# Methodology: Manual 3-round benchmark — each round generates a fresh spec
#   per model, scores it with spec-scorer, then iterates once with feedback.
#   All 3 rounds use the same PRD, template, and scoring rubric.
# Scorer: Speculator spec-scorer agent (LLM-as-judge, claude-sonnet-4-6)
# Iterations per round: 1 (raw → v1)
# Total data points: 18 (3 models × 3 rounds × 2 stages)

benchmark:
  prd: weather-transport
  rounds: 3
  iterations_per_round: 1
  scorer_model: claude-sonnet-4-6
  pass_threshold: 7.8

models:
  - id: sonnet-4-6
    label: "Sonnet 4.6"
    relative_cost: "1x"
  - id: opus-4-6
    label: "Opus 4.6"
    relative_cost: "3x"
  - id: gpt-5.4
    label: "GPT-5.4"
    relative_cost: "1x"

rounds:
  round_1:
    sonnet-4-6:
      raw: 7.4
      iterated: 8.4
      lift: 1.0
    opus-4-6:
      raw: 7.7
      iterated: 8.1
      lift: 0.4
    gpt-5.4:
      raw: 8.0
      iterated: 8.3
      lift: 0.3

  round_2:
    sonnet-4-6:
      raw: 6.9
      iterated: 8.5
      lift: 1.6
    opus-4-6:
      raw: 7.7
      iterated: 8.8
      lift: 1.1
    gpt-5.4:
      raw: 8.1
      iterated: 8.5
      lift: 0.4

  round_3:
    sonnet-4-6:
      raw: 7.5
      iterated: 8.4
      lift: 0.7
    opus-4-6:
      raw: 6.9
      iterated: 8.8
      lift: 1.3
    gpt-5.4:
      raw: 8.0
      iterated: 8.4
      lift: 0.4

aggregates:
  sonnet-4-6:
    avg_raw: 7.27
    sigma_raw: 0.32
    avg_iterated: 8.43
    sigma_iterated: 0.06
    avg_lift: 1.10
  opus-4-6:
    avg_raw: 7.43
    sigma_raw: 0.46
    avg_iterated: 8.57
    sigma_iterated: 0.40
    avg_lift: 0.93
  gpt-5.4:
    avg_raw: 8.03
    sigma_raw: 0.06
    avg_iterated: 8.40
    sigma_iterated: 0.10
    avg_lift: 0.37

validated_findings:
  - id: F1
    finding: "GPT-5.4 is the most consistent raw spec writer"
    evidence: "Avg 8.03, sigma=0.06 — passes 7.8 threshold every round without iteration"

  - id: F2
    finding: "Opus 4.6 has the highest post-iteration ceiling"
    evidence: "Avg iterated 8.57, hit 8.8 twice. Most volatile raw score (sigma=0.46)"

  - id: F3
    finding: "Sonnet 4.6 has the most reliable iteration lift"
    evidence: "Avg lift +1.10, tightest post-iteration variance (sigma=0.06). Always lands at ~8.4"

  - id: F4
    finding: "Speculator ALWAYS improves specs"
    evidence: "9/9 iterations showed positive lift. No regressions across any model or round"

  - id: F5
    finding: "Post-iteration convergence is real"
    evidence: "All 3 models converge to 8.4-8.6 range after iteration, regardless of starting point"

  - id: F6
    finding: "The iteration loop is the equalizer"
    evidence: >
      Sonnet (1x cost) → avg 8.43 iterated.
      GPT-5.4 (1x cost) → avg 8.40 iterated.
      Opus (3x cost) → avg 8.57 iterated.
      The 3x cost of Opus buys +0.14 points over Sonnet.

model_profiles:
  sonnet-4-6:
    best_for: "Best Speculator ROI (cheap model + iteration = 8.4)"
    risk: "Raw score variance (6.9-7.5)"
  opus-4-6:
    best_for: "Highest ceiling when iteration lands well (8.8)"
    risk: "Most volatile (raw 6.9-7.7, iter 8.1-8.8)"
  gpt-5.4:
    best_for: "Skip iteration entirely (8.0+ raw)"
    risk: "Lowest lift from iteration (+0.37)"

thesis:
  - "Speculator always improves specs (9/9 positive lifts)"
  - "Post-iteration, all models converge (~8.4-8.6)"
  - "A $1 model + Speculator matches a $3 model + Speculator"
  - "Cheapest path to good spec: Sonnet + 1 iteration (avg 8.43, cost: 2x Sonnet calls)"
  - "Fastest path: GPT-5.4 raw (avg 8.03, no iteration needed)"
