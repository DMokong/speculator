# Functional test checklist for PRD-001 v2: Smart Commuter — Weather-Aware Route Planner
# Layer 1: Playwright-testable assertions mapped to each requirement.
# These are smoke-level checks — presence and basic correctness, not full integration.

functional_checklist:
  - id: F01
    requirement: "R01: Current weather display (temp, feels-like, wind)"
    test: "Page contains a visible element with a numeric value followed by °C, text matching 'Feels like', and a value followed by 'km/h'"

  - id: F02
    requirement: "R02: 5-day forecast"
    test: "Page contains at least 5 elements displaying abbreviated day names (Mon/Tue/Wed/Thu/Fri/Sat/Sun) each accompanied by two temperature values and an icon element"

  - id: F03
    requirement: "R03: Save multiple named routes"
    test: "A 'Save Route' or 'Add Route' button is visible; after creating a route via the builder UI, the route appears in a saved routes list with its user-given name"

  - id: F04
    requirement: "R04: Route builder with cascading stop filters"
    test: "Route builder UI contains a stop search input; selecting a transport mode filters the visible stops; selecting an origin stop narrows available destination stops"

  - id: F05
    requirement: "R05: Multi-leg route support"
    test: "Route builder has an 'Add Leg' or 'Add Transfer' button; after adding two legs, both appear in the route preview with origin→destination for each leg"

  - id: F06
    requirement: "R06: Browse/search stops by transport type"
    test: "A transport type filter (train/metro/tram/ferry) is visible; selecting 'metro' changes the displayed stop list to only show metro stations"

  - id: F07
    requirement: "R07: Feasible departure options for current time"
    test: "After selecting a saved route, a list of trip options appears, each with at least one departure time in HH:MM format"

  - id: F08
    requirement: "R08: Trip option details (departure times, transfer wait, arrival)"
    test: "Each trip option shows per-leg departure times, a transfer wait duration (e.g. '8 min wait'), and a final arrival time"

  - id: F09
    requirement: "R09: On-time/delayed status per departure"
    test: "Each departure within a trip option contains either a green 'On time' indicator or a delay indicator showing a time difference"

  - id: F10
    requirement: "R10: Transfer risk indicator"
    test: "Transfer points in trip options show a time value; transfers under 5 minutes are visually highlighted (different colour, icon, or label like 'tight')"

  - id: F11
    requirement: "R11: Weather delay recommendation"
    test: "When weather data includes heavy rain or thunderstorm codes, a recommendation banner or message is visible suggesting earlier departure"

  - id: F12
    requirement: "R12: Route-segment weather awareness"
    test: "Weather warnings reference specific route segments or stops rather than only showing a single global weather status"

  - id: F13
    requirement: "R13: Service advisories display"
    test: "An advisories section or panel is visible showing at least a heading like 'Service Alerts' or 'Advisories' with content sourced from TfNSW"

  - id: F14
    requirement: "R14: Advisory-to-route correlation"
    test: "Advisories are tagged or grouped by which saved route or leg they affect, not displayed as an unsorted generic list"

  - id: F15
    requirement: "R15: Behaviour pattern tracking"
    test: "After multiple simulated check-ins, localStorage or IndexedDB contains entries recording timestamps and route selections"

  - id: F16
    requirement: "R16: Browser notifications support"
    test: "A notification preferences toggle or 'Enable notifications' button is present in settings; the page requests Notification API permission when enabled"

  - id: F17
    requirement: "R17: Persistent storage"
    test: "After saving a route and reloading the page, the saved route is still present in the routes list without re-entering it"

  - id: F18
    requirement: "R18: Time-of-day greeting"
    test: "Page header contains one of: 'Good morning', 'Good afternoon', 'Good evening', or 'Good night'"

  - id: F19
    requirement: "R19: Responsive layout"
    test: "At viewport width 375px, main panels are stacked vertically; at viewport width 1024px they appear side by side"

  - id: F20
    requirement: "R20: Auto-refresh and last-updated timestamp"
    test: "Page contains a visible refresh button and a 'Last updated' label followed by a time value; clicking refresh updates the timestamp"
