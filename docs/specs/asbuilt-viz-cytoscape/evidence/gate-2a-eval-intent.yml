reasoning:
  intent_coverage: "9 of 10 evals (all but ac-6.md) are stated in terms a reviewer, maintainer, or operator could verify by looking at the running artifact -- e.g. ac-8.md: 'opens the same viz.html twice... sees the same arrangement both times'; ac-10.md: 'clusters sit close to one another... the map reads as one coherent packed picture, not islands scattered around a void.' None of the ten evals reference min-zoomed-font-size, fcose, compound nodes, or other AC-text implementation vocabulary even though the spec's own AC2/AC8 language uses those terms. ac-6.md leans more technical ('the embedded data reports correct concept/audit counts... the project's viz test suite') because its subject -- preserving existing test-suite guarantees -- is inherently about a technical artifact, which keeps the set at 'good' rather than 'excellent' (no eval explicitly states it would remain valid across differing implementations)."
  anti_pattern_detection: "All 5 of the spec's named anti-patterns are now explicitly cited by number with a dedicated 'would fail if' clause: ac-2.md -> anti-pattern #1 (permanent label suppression by group size), ac-10.md -> anti-pattern #2 (population-scaled anchor rings / empty space between clusters), ac-4.md -> anti-pattern #3 (baking layout coordinates into the artifact), ac-3.md and ac-9.md -> anti-pattern #4 (CDN loading, covered from both the view-time and build-time angles), ac-1.md -> anti-pattern #5 (renaming the tests bucket while still clustering spatially). This closes the previous round's gap, where anti-pattern #2 had zero coverage anywhere in the set (the new ac-10.md eval is built specifically to catch it, including an explicit callback to the reverted ring layout named in the spec's Problem Statement)."
  journey_completeness: "2 of 4 critical journeys are traced end-to-end by a single eval: Journey 2 ('unchanged bundle -> byte-identical rebuild, drift diffs stay quiet') by ac-4.md, and Journey 4 ('file:// double-click, no network, fully functional') by ac-3.md, which explicitly lists every interaction (zoom/pan, tooltips, detail panel, search, filters) as part of the offline-functional claim. The other 2 journeys now have full beat-level coverage but remain split across multiple eval files rather than one combined narrative: Journey 1's compactness beat (previously entirely uncovered) is now handled by ac-10.md, and Journey 3's real-bundle legibility claim (previously entirely uncovered) is now handled by ac-7.md's extension. This is a material improvement from the prior round's score of 6, but the lack of a single full-path eval for the two split journeys keeps the set short of the 'excellent' tier."
  implementation_independence: "The set consistently avoids naming Cytoscape, fcose, compound nodes, min-zoomed-font-size, Math.random/Date.now, or any internal data structure even where the spec's own AC text does -- ac-8.md describes reload-stable arrangement without mentioning seeded randomization or randomize:false, and ac-9.md says 'third-party rendering libraries' rather than naming Cytoscape/fcose. ac-10.md's bounding-box-ratio measurement is inherited directly from the spec's own AC10 definition (a spec-level acceptance formula, not an eval-author implementation choice) and remains a generically measurable property regardless of which layout engine produced the arrangement. 'viz.html' appears as a file reference throughout but is the spec's own named deliverable artifact (R5), not an internal implementation detail, so it does not count against this dimension. A team shipping a materially different rendering architecture that hit the same observable outcomes would pass every eval in this set."
