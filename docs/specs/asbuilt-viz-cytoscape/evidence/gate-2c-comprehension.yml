    gap_notes: >
      I ran `bun test tests/viz-layout.test.ts` myself (3 separate runs,
      identical each time): the measured packing factor is **2.636**, not
      the **4.116** that both the spec's AC10 text and the test's own
      `PACKING_BOUND` comment ("spike checkpoint measured 4.116") cite as
