      and the spec explicitly disclaims this ratio as a compactness
      discriminator (the old rejected ring layout measured 2.63 by the
      same metric and "would pass" too), so a passing result here doesn't
      by itself confirm or deny visual compactness, and 2.636 vs 4.116
      doesn't necessarily mean anything got worse (a lower ratio generally
      means *less* wasted space, i.e. tighter packing, which would be a
      good sign if trustworthy). But nothing in the diff reconciles why the
      shipped code's own measured value differs this much (~36%) from the
      number the drift-anchor's narrative is built around, and the
      artifact should not repeat "matches the 4.116 checkpoint" as if
      confirmed — it isn't, on the evidence I could gather cold.
    intent_notes: >
