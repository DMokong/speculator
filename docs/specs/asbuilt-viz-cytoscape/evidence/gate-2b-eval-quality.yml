  behavioral_specificity: "The large majority of assertions are genuinely behavioral: embedded JSON payload contents, byte-equal vendor regions, independently-computed sha256 hashes, real settled node positions from the actual vendored fcose engine run headlessly, and real CLI subprocess exit codes/stderr. AC2's structural/inspection-style assertions are correctly matched to that AC's own letter ('when its stylesheet and script are inspected'), so they aren't a deduction. AC5's six tests, however, verify information-surface and wiring via source-text presence checks on extracted JS functions rather than executing the interaction and reading rendered output — a legitimate stand-in given the runtime, but one that would break on a behavior-preserving rename and wouldn't necessarily catch a logic bug that leaves the pinned substrings intact, which keeps this dimension at 'Good' rather than 'Excellent'."
  intent_fidelity: "Intent fidelity is strong across the board, evidenced by multiple documented hardening rounds that closed letter-vs-spirit gaps (asymmetric type-only/tag-only OR-branch classification, insertion-order-vs-codepoint-sort determinism invisible to same-process reinvocation, a self-referential vendor-hash check replaced with an independent VENDOR.md ground truth, a hand-copied fcose-options literal replaced with a live read of the shipped template). AC2's suppression tests target the exact reverted anti-patterns named in the spec's own Problem Statement/Anti-Patterns sections, and AC10's packing-factor test correctly encodes the 2026-07-16 amendment (the reverted ring no longer needs to fail this metric) rather than testing a superseded, stricter requirement. AC5's proxy-verification approach is the main thing keeping this from a 9-10."
  sensitivity: "Sensitivity is strong: exact numeric pins (dim opacity 0.08, min-zoomed-font-size 24, packing bound 4.5 with the measured value logged alongside it, diameter formula via toBeCloseTo, exact sha256 hashes), a broad no-conditional-logic check on buildStyle() that would catch most reintroductions of population-conditional suppression regardless of variable naming, and a documented multi-round adversarial-mutation history (named survivors closed) for AC1/AC4/AC6/AC7/AC9/AC10. AC5's source-text checks are moderately but not maximally discriminating — they'd catch a dropped field or handler but could miss a subtler logic regression that leaves the literal substrings in place."
  scenario_completeness: "Most ACs cover more than the happy path: AC1 covers the 2-segment path-grouping boundary plus both halves of an OR-condition classification signal tested independently; AC7's CLI block covers missing --target, missing --date, default --out, and explicit --out override; AC8 covers both a positive (positions match across runs) and negative (no Math.random/Date.now/new Date()) scenario; AC9 covers hash equality and a license-substring pin as two independent signals; AC2 and AC5 each cover the full explicit scenario space their AC text names (child-gated/parent-ungated/no-suppression; hover/click/search/filter/chips/table+theme respectively)."
  assertion_density: "Assertions throughout are precise and multi-part rather than presence checks — single tests assert exact concepts/audited/target_commit/date/folds counts together, exact per-group node counts across four-plus groups, exact sha256 equality plus a specific license substring, and exact diameter/class/parent values per node. No vacuous is-not-None-style assertions were found in any of the reviewed files, including the new viz-surface.test.ts."
  test_independence: "Every sandbox is built via mkdtempSync with a unique per-call temp directory and torn down via rmSync in a finally block or an explicit trailing cleanup test; viz-surface.test.ts introduces no shared mutable state (a single module-scope readFileSync of the template, read-only). The unaddressed soft spot carried over from the prior round is describe blocks that rely on in-file declaration order plus a trailing cleanup test rather than an afterAll hook — a latent, not yet realized, ordering assumption."
