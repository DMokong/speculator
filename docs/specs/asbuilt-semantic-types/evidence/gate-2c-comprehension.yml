      decideConceptType()'s JSDoc (fold.ts:75-91) states a 5-step
      "precedence, checked in order" list that puts "existing semantic type
      wins" as step 1 and "test-classified resource" as step 2, but the
      function's actual runtime order (confirmed by reading lines 98-134
      and the separate inline comment at lines 105-114, which itself states
      the correct order) is malformed -> literal Module/Test -> test-
      boundary -> existing-semantic -> apply. The JSDoc's numbered list and
      the inline "Precedence is CANONICAL..." comment eight lines below it
      disagree with each other.
    file: asbuilt/src/fold.ts
    line_range: "75-114"
    concern: minor_utility
    recommendation: >
      Update the JSDoc's numbered list to match the inline canonical-
      precedence comment's order, or delete the numbered list and point to
      the inline comment as the single source of truth — a future reader
      trusting the JSDoc's ordering would misdescribe AC9a's precedence
      over AC2's.

  - description: >
      reclassify.ts's file-header "Two-phase run" documentation (lines
      26-49) lists the apply-phase classification steps as: skeleton-only
      skip, literal-Module/Test skip, current-type-Test skip, already-
      semantic preserve, otherwise apply — five steps. The actual apply
      loop (lines 221-273) has six: it inserts a resource-filename-derived
      test-boundary guard (lines 239-252, the final-audit AC4 amendment)
      between the literal-Module/Test skip and the current-type-Test skip.
      The header comment was not updated when that guard was added.
    file: asbuilt/src/reclassify.ts
    line_range: "26-49"
    concern: minor_utility
    recommendation: >
      Add the missing test-boundary-guard step to the header's ordered
      list so the file's own top-of-file documentation matches its apply
      loop — this is exactly the kind of drift a future engineer modifying
      reclassify.ts would trust and get burned by.

