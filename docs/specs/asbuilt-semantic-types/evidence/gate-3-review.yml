  - >-
    correctness/warn, finding 1: fold.ts:115 and reclassify.ts:193 define
    "malformed suggested_type" differently — fold only rejects the exact
    empty string while reclassify also rejects whitespace-only strings via
    .trim(). A whitespace-only suggested_type (e.g. a single space) would be
    silently written into a concept's frontmatter `type` field by fold but
    refused by reclassify's all-or-nothing validation. Neither path has a
    test exercising this specific input. Low real-world likelihood (AGENT.md
    instructs the agent to emit single capitalized tokens), but worth
    aligning fold's check to reclassify's .trim()-based one for true
    parity.
  - >-
    correctness/warn, finding 2: fold.ts's existing-semantic check
    (fold.ts:127-128) explicitly excludes existingType === "Test" from being
    "semantic", so a concept whose CURRENT frontmatter type is literally Test
    but whose resource filename is NOT test-pattern (a drifted/hand-edited
    state) would have a new suggestion applied by fold's precedence chain.
    reclassify.ts:254-258 has an unconditional currentType === "Test" guard
    that would leave the identical concept untouched instead. Both behaviors
    are defensible in isolation (fold's arguably matches reclassifyType()'s
    own "Test is machine vocabulary, re-derive from resource" philosophy;
    reclassify's is the more conservative "never touch anything currently
    typed Test" reading), but the two "canonical" precedence implementations
    are not, in fact, identical for this input, and it is untested on either
    path. The underlying reclassifyType() self-heals this drift on any
    no-suggestion fold/refresh pass, which bounds the practical impact.
  - >-
    readability, non-blocking: the type-precedence decision is hand-
    duplicated between fold.ts's decideConceptType (fold.ts:98-134) and
    reclassify.ts's inline apply-phase branches (reclassify.ts:221-273)
    rather than factored into one shared function alongside the existing
    reclassifyType/conceptType helpers in concept.ts. This duplication is
    exactly what produced the divergence the final-audit commit (8fd6e3c) had
    to fix, and the two residual gaps recorded above suggest the risk isn't
    fully retired. A follow-up extracting a single shared "decide semantic
    type" helper (parameterized on whether the caller needs a Reason string,
    for reclassify's skip/preserve messages) would remove this class of bug
    at the source rather than relying on doc-comment discipline to keep two
