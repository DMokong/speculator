  recommended:
    - "Several evals lean on domain vocabulary that is spec-mandated as the artifact/CLI contract itself (suggested_type, applied/preserved/skipped counts, the generator artifact, the shipped AGENT.md) rather than an author's private implementation choice, so this is defensible — but it is still fairly technical for a reader with zero prior exposure to the As-Built pipeline. A one-line plain-language gloss per eval (e.g. 'the record of what the AI enrichment step decided') would push several evals from Good into the Excellent intent-coverage band without weakening their precision."
